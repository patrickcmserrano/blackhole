anatomy_title:"Anatomy of the Abyss",event_horizon:"Event Horizon:",event_horizon_desc:"The point of no return. The central black sphere you see in the visualization. Once you cross this line, you belong to the black hole forever.",singularity:"Singularity:",singularity_desc:"The theoretical center. A point of infinite density and zero volume where the laws of physics as we know them cease to make sense.",accretion_disk:"Accretion Disk:",accretion_disk_desc:"The bright, hot ring of gas and dust spinning at speeds close to the speed of light. Friction generates so much heat that the disk glows in X-rays, making the black hole indirectly visible."},section2:{title:"2. Giants of Science: A Timeline",p1:"Understanding these cosmic monsters didn't happen overnight. It was a centuries-long construction.",year_1783_title:"The Visionary: John Michell",year_1783_desc:'An English clergyman and astronomer who first proposed the idea of "dark stars." Using Newtonian physics, he calculated that a star could be so massive that its escape velocity would exceed the speed of light.',year_1915_title:"The Architect: Albert Einstein",year_1915_desc:'His Theory of General Relativity created the foundation for them. Einstein showed that gravity is not a magical "force," but the curvature of space-time caused by mass.',einstein_quote:'"Matter tells space how to curve. Space tells matter how to move."',year_1916_title:"The Solver: Karl Schwarzschild",year_1916_desc:"Months after Einstein's publication, Schwarzschild found the first exact solution to the equations, predicting the exact size something needs to be compressed to become a black hole.",era_golden_title:"The Golden Age",wheeler_name:"John Wheeler:",wheeler_desc:'Popularized the term "black hole."',penrose_name:"Roger Penrose:",penrose_desc:"Proved that singularities are inevitable in gravitational collapse.",hawking_name:"Stephen Hawking:",hawking_desc:'Showed that black holes emit radiation ("Hawking Radiation").',year_2019_title:"The Image: EHT Collaboration",year_2019_desc:"A global network of radio telescopes captured the first direct image of the shadow of a supermassive black hole in M87."},section3:{title:"3. The Mathematical Language of the Cosmos",p1:"You don't need to be a physicist to appreciate the beauty of the equations that describe these monsters.",schwarzschild_title:"Schwarzschild Radius",schwarzschild_desc:`This equation defines the size of the black hole's "mouth."`,rs:"Horizon radius",m:"Object mass",g:"Gravitational constant",c:"Speed of light",einstein_eq_title:"Einstein Field Equations",einstein_eq_desc:"The foundation of all modern cosmology.",left_side:"Left Side (Gμν):",left_side_desc:"Describes the geometry (curvature) of space-time.",right_side:"Right Side (Tμν):",right_side_desc:"Describes the distribution of matter and energy.",einstein_summary:'"The presence of mass curves the universe around it."'},section4:{title:"4. Why Does It Matter?",item1_title:"1. The Ultimate Laboratory",item1_desc:'The only place where General Relativity and Quantum Mechanics collide. The key to the "Theory of Everything."',item2_title:"2. GPS Technology",item2_desc:"GPS systems depend on Einstein's relativistic corrections. Without them, accuracy would drop by kilometers per day.",item3_title:"3. Gravitational Waves",item3_desc:'Since 2015, we can "hear" black hole collisions, a new window to observe the invisible.',item4_title:"4. Philosophy",item4_desc:"They represent the limit of knowledge and force us to confront the vastness and strangeness of the universe."},section5:{title:"5. Behind the Code",intro:"This visualization runs entirely in your browser using WebGL for real-time rendering.",item1_title:"Shaders & GLSL",item1_desc:"We don't use static images. The ring and disk are mathematically generated pixel-by-pixel using shaders, allowing full control over light and color.",item2_title:"Procedural Noise",item2_desc:"The 'fire' texture of the accretion disk is created with noise algorithms (Perlin/Simplex Noise), ensuring organic and continuous movement.",item3_title:"Post-Processing",item3_desc:"The ethereal glow (Bloom) is applied after the scene render, simulating how real cameras react to intense light sources."}},neutron:{title_main:"Neutron Stars",title_sub:"The Queen of Density",description:"A journey to the densest object in the cosmos, where matter is crushed to the limit and magnetic fields defy imagination.",tags:["Astrophysics","Pulsar","Three.js","Magnetism"],scroll_hint:"Observe the cosmic lighthouse",section1:{title:"1. The Stellar Corpse",p1:"When a giant star dies in a supernova, but isn't massive enough to become a black hole, it becomes this: a ball of pure neutrons.",density_title:"Inconceivable Density:",density_desc:"Imagine squeezing the mass of 1.5 Suns into a sphere the size of Manhattan (approx. 20km). A teaspoon of this matter would weigh as much as Mount Everest.",crust_title:"The Iron Crust",crust_p:'Unlike normal gaseous stars, they have a solid crust, 10 billion times harder than steel. "Mountains" on this surface would be only a few millimeters high due to the crushing gravity.'},section2:{title:"2. The Cosmic Lighthouse (Pulsars)",p1:"Many neutron stars spin insanely fast — hundreds of times per second. They emit beams of radiation from their magnetic poles.",p2:`Because the magnetic axis doesn't always align with the rotation axis, these beams sweep across the sky. If Earth is in the path, we see a regular "pulse" of light, like a lighthouse. Hence the name: Pulsar.`},section3:{title:"3. Extreme Magnetism",magnetar_title:"Magnetars",magnetar_desc:"Some neutron stars, called Magnetars, possess the strongest magnetic fields in the universe.",earth:"Earth:",fridge_magnet:"Fridge Magnet:",mri:"MRI:",magnetar:"Magnetar:",magnetar_warning:"This field is so strong that, from 1000km away, it would distort the atoms in your body, turning your chemistry into something impossible to sustain life."}},saturn:{title_main:"The Lord of the Rings",title_sub:"Saturn's Grandeur",description:"A visual journey to the gas giant, its icy rings, and the moons that hold secrets of life.",tags:["Solar System","Cassini","Astronomy","Three.js"],scroll_hint:"Explore the rings",section1:{title:"1. Not a Solid Disk",p1:"Although they look solid from Earth, Saturn's rings are actually composed of billions of pieces of ice and rock.",p2:"The size of these particles ranges from dust grains to entire mountains. The visualization you see uses thousands of individually simulated small rocks to recreate this dispersion.",fact_title:"Surprising Fact:",fact_desc:"Despite being thousands of kilometers wide, the rings are incredibly thin — on average, they are only about 10 meters thick."},section2:{title:"2. Shepherd Moons and Life",p1:"Saturn does not reign alone. It is accompanied by a court of dozens of moons. Some, called Shepherd Moons, orbit within or near the rings, using their gravity to keep the ice particles in order, creating the visible gaps between the rings.",enceladus_title:"Enceladus: Where Life Might Exist",enceladus_p:"One of the most fascinating moons is Enceladus. Covered in a layer of brilliant white ice, it hides a global ocean of liquid water beneath the surface. Giant geysers spew water into space, suggesting this small world may have all the ingredients necessary for life."},section3:{title:"3. The Legacy of Cassini",p1:"Much of what we know today comes from the Cassini-Huygens mission (1997-2017). For 13 years, the probe orbited Saturn, sending back stunning images and revolutionary data.",p2:`In its "Grand Finale," Cassini bravely plunged into the narrow space between the planet and its rings, before disintegrating in Saturn's atmosphere to protect the moons from Earthly contamination.`}},nebula:{title_main:"Cosmic Nurseries",title_sub:"Nebulae",description:"Where stars are born. A colossal cloud of gas and dust sculpted by the radiation from newborn stars.",tags:["Nebula","Star Formation","Cosmic Chemistry"],scroll_hint:"Dive into the cloud",section1:{title:"1. Clouds of Possibilities",p1:"A nebula has no solid surface. It is a giant cloud of gas (mainly hydrogen) and cosmic dust. The visualization you see uses thousands of transparent light points to simulate this volumetric effect.",p2:'Some of these clouds, like the famous "Pillars of Creation," are light-years high. They are true star factories.'},section2:{title:"2. The Chemistry of Color",p1:'The vibrant colors of nebulae are not "painted"; they are the chemical signature of elements being ionized by intense radiation from nearby stars.',pink_title:"Pink/Red:",pink_desc:"The most common color, caused by glowing Hydrogen.",cyan_title:"Blue/Green:",cyan_desc:"Generally indicates the presence of Oxygen (OIII)."},section3:{title:"3. The Collapse",p1:"Inside these dark, cold clouds, gravity begins to win. Clusters of gas start to collapse under their own weight, becoming hotter and denser until... NUCLEAR FUSION. A star is born, illuminating the surrounding cloud from within."}}},Og={nav:{blackhole:"Buraco Negro",neutronstar:"Estrela de Nêutrons",saturn:"Saturno",nebula:"Nebulosa"},common:{scroll_hint:"Explore o universo abaixo",author:"Patrick Serrano",date:"24/01/2026",app_title:"Visualização Interativa do Universo",audio_on:"Áudio Ligado",audio_off:"Áudio Desligado",loading:"Carregando...",audio_unavailable:"Indisponível"},blackhole:{title_main:"No Limite da Realidade",title_sub:"Uma Jornada aos Buracos Negros",description:"Uma exploração visual e interativa sobre a física, história e mistério dos buracos negros, potencializada por Three.js.",tags:["Astrofísica","Educação","Three.js","Interativo"],section1:{title:"1. O Que é um Buraco Negro?",subtitle:"O Derradeiro Ralo Cósmico",p1:"Imagine um lugar onde a gravidade é tão intensa que nada, absolutamente nada, consegue escapar. Nem foguetes, nem partículas, nem mesmo a luz — a coisa mais rápida do universo. Esse lugar é um buraco negro.",p2:'Eles não são "buracos" no sentido tradicional, mas sim quantidades imensas de matéria espremida em um espaço incrivelmente pequeno.',analogy:"Analogia: É como compactar a massa de dez sóis no tamanho de uma cidade como São Paulo. O resultado é um campo gravitacional que deforma o tecido do espaço e do tempo ao seu redor de forma irreversível.",anatomy_title:"Anatomia do Abismo",event_horizon:"Horizonte de Eventos:",event_horizon_desc:"O ponto de não retorno. A esfera preta central que você vê na visualização. Cruzou essa linha, você pertence ao buraco negro para sempre.",singularity:"Singularidade:",singularity_desc:"O centro teórico. Um ponto de densidade infinita e volume zero onde as leis da física como conhecemos deixam de fazer sentido.",accretion_disk:"Disco de Acreção:",accretion_disk_desc:"O anel brilhante e quente de gás e poeira girando em velocidades próximas à da luz. O atrito gera tanto calor que o disco brilha em raios-X, tornando o buraco negro visível indiretamente."},section2:{title:"2. Gigantes da Ciência: Uma Linha do Tempo",p1:"A compreensão desses monstros cósmicos não aconteceu da noite para o dia. Foi uma construção de séculos.",year_1783_title:"O Visionário: John Michell",year_1783_desc:'Um clérigo e astrônomo inglês que propôs pela primeira vez a ideia de "estrelas escuras". Usando a física newtoniana, ele calculou que uma estrela poderia ser tão massiva que sua velocidade de escape superaria a da luz.',year_1915_title:"O Arquiteto: Albert Einstein",year_1915_desc:'Sua Teoria da Relatividade Geral criou a fundação para eles. Einstein mostrou que a gravidade não é uma "força" mágica, mas a curvatura do espaço-tempo causada pela massa.',einstein_quote:'"A matéria diz ao espaço como se curvar. O espaço diz à matéria como se mover."',year_1916_title:"O Solucionador: Karl Schwarzschild",year_1916_desc:"Meses após a publicação de Einstein, Schwarzschild encontrou a primeira solução exata para as equações, prevendo o tamanho exato que algo precisa ser comprimido para virar um buraco negro.",era_golden_title:"A Era de Ouro",wheeler_name:"John Wheeler:",wheeler_desc:'Popularizou o termo "buraco negro".',penrose_name:"Roger Penrose:",penrose_desc:"Provou que singularidades são inevitáveis no colapso gravitacional.",hawking_name:"Stephen Hawking:",hawking_desc:'Mostrou que buracos negros emitem radiação ("Radiação Hawking").',year_2019_title:"A Imagem: Colaboração EHT",year_2019_desc:"Uma rede global de radiotelescópios capturou a primeira imagem direta da sombra de um buraco negro supermassivo em M87."},section3:{title:"3. A Linguagem Matemática do Cosmos",p1:"Não precisamos ser físicos para apreciar a beleza das equações que descrevem esses monstros.",schwarzschild_title:"O Raio de Schwarzschild",schwarzschild_desc:'Esta equação define o tamanho da "boca" do buraco negro.',rs:"Raio do horizonte",m:"Massa do objeto",g:"Constante gravitacional",c:"Velocidade da luz",einstein_eq_title:"Equações de Campo de Einstein",einstein_eq_desc:"A base de toda a cosmologia moderna.",left_side:"Lado Esquerdo (Gμν):",left_side_desc:"Descreve a geometria (curvatura) do espaço-tempo.",right_side:"Lado Direito (Tμν):",right_side_desc:"Descreve a distribuição de matéria e energia.",einstein_summary:'"A presença de massa curva o universo ao seu redor".'},section4:{title:"4. Por Que Isso Importa?",item1_title:"1. O Laboratório Definitivo",item1_desc:'O único lugar onde a Relatividade Geral e a Mecânica Quântica colidem. A chave para a "Teoria de Tudo".',item2_title:"2. Tecnologia GPS",item2_desc:"Sistemas GPS dependem das correções relativísticas de Einstein. Sem elas, a precisão cairia quilômetros por dia.",item3_title:"3. Ondas Gravitacionais",item3_desc:'Desde 2015, podemos "ouvir" colisões de buracos negros, uma nova janela para observar o invisível.',item4_title:"4. Filosofia",item4_desc:"Eles representam o limite do conhecimento e nos forçam a confrontar a vastidão e estranheza do universo."},section5:{title:"5. Bastidores do Código",intro:"Essa visualização roda inteiramente no seu navegador, usando WebGL para renderização em tempo real.",item1_title:"Shaders & GLSL",item1_desc:"Não usamos imagens estáticas. O anel e o disco são gerados matematicamente pixel por pixel usando shaders, permitindo controle total sobre a luz e cor.",item2_title:"Ruído Procedural",item2_desc:"A textura de 'fogo' do disco de acreção é criada com algoritmos de ruído (Perlin/Simplex Noise), garantindo um movimento orgânico e contínuo.",item3_title:"Pós-Processamento",item3_desc:"O brilho etéreo (Bloom) é aplicado após a renderização da cena, simulando como câmeras reais reagem a fontes de luz intensa."}},neutron:{title_main:"Estrelas de Nêutrons",title_sub:"A Rainha da Densidade",description:"Uma viagem ao objeto mais denso do cosmos, onde a matéria é esmagada ao limite e campos magnéticos desafiam a imaginação.",tags:["Astrofísica","Pulsar","Three.js","Magnetismo"],scroll_hint:"Observe o farol cósmico",section1:{title:"1. O Cadáver Estelar",p1:"Quando uma estrela gigante morre em uma supernova, mas não é massiva o suficiente para virar um buraco negro, ela vira isso: uma bola de nêutrons puros.",density_title:"Densidade Inconcevível:",density_desc:"Imagine espremer a massa de 1,5 Sóis dentro de uma esfera do tamanho da ilha de Manhattan (aprox. 20km). Uma colher de chá dessa matéria pesaria tanto quanto o Monte Everest.",crust_title:"A Crosta de Ferro",crust_p:'Ao contrário de estrelas normais gasosas, elas possuem uma crosta sólida, 10 bilhões de vezes mais dura que o aço. "Montanhas" nessa superfície teriam apenas alguns milímetros de altura devido à gravidade esmagadora.'},section2:{title:"2. O Farol Cósmico (Pulsares)",p1:"Muitas estrelas de nêutrons giram insanamente rápido — centenas de vezes por segundo. Elas emitem feixes de radiação pelos polos magnéticos.",p2:'Como o eixo magnético nem sempre alinha com o eixo de rotação, esses feixes varrem o céu. Se a Terra estiver no caminho, vemos um "pulso" de luz regular, como um farol marítimo. Daí o nome: Pulsar.'},section3:{title:"3. Magnetismo Extremo",magnetar_title:"Magnetars",magnetar_desc:"Algumas estrelas de nêutrons, chamadas Magnetars, possuem os campos magnéticos mais fortes do universo.",earth:"Terra:",fridge_magnet:"Ímã de Geladeira:",mri:"Ressonância Magnética:",magnetar:"Magnetar:",magnetar_warning:"Esse campo é tão forte que, a 1000km de distância, ele distorceria os átomos do seu corpo, transformando sua química em algo impossível de sustentar a vida."}},saturn:{title_main:"O Senhor dos Anéis",title_sub:"A Grandeza de Saturno",description:"Uma viagem visual ao gigante gasoso, seus anéis de gelo e as luas que guardam segredos de vida.",tags:["Sistema Solar","Cassini","Astronomia","Three.js"],scroll_hint:"Explore os anéis",section1:{title:"1. Não é um Disco Sólido",p1:"Embora pareçam sólidos vistos da Terra, os anéis de Saturno são, na verdade, compostos por bilhões de pedaços de gelo e rocha.",p2:"O tamanho dessas partículas varia de grãos de poeira a montanhas inteiras. A visualização que você vê usa milhares de pequenas rochas simuladas individualmente para recriar essa dispersão.",fact_title:"Fato Surpreendente:",fact_desc:"Apesar de terem milhares de quilômetros de largura, os anéis são incrivelmente finos — em média, têm apenas cerca de 10 metros de espessura."},section2:{title:"2. As Luas Pastoras e a Vida",p1:"Saturno não reina sozinho. Ele é acompanhado por uma corte de dezenas de luas. Algumas, chamadas de Luas Pastoras, orbitam dentro ou perto dos anéis, usando sua gravidade para manter as partículas de gelo em ordem, criando as falhas visíveis entre os anéis.",enceladus_title:"Encélado: Onde a Vida Pode Existir",enceladus_p:"Uma das luas mais fascinantes é Encélado. Coberta por uma camada de gelo branco brilhante, ela esconde um oceano global de água líquida abaixo da superfície. Gêiseres gigantes cospem água no espaço, sugerindo que este pequeno mundo pode ter todos os ingredientes necessários para a vida."},section3:{title:"3. O Legado da Cassini",p1:"Muito do que sabemos hoje vem da missão Cassini-Huygens (1997-2017). Durante 13 anos, a sonda orbitou Saturno, enviando imagens deslumbrantes e dados revolucionários.",p2:'Em seu "Grand Finale", a Cassini mergulhou corajosamente no espaço estreito entre o planeta e seus anéis, antes de se desintegrar na atmosfera de Saturno para proteger as luas de contaminação terrestre.'}},nebula:{title_main:"Berçários Cósmicos",title_sub:"Nebulosas",description:"Onde as estrelas nascem. Uma nuvem colossal de gás e poeira esculpida pela radiação de estrelas recém-nascidas.",tags:["Nebulosa","Formação Estelar","Química Cósmica"],scroll_hint:"Mergulhe na nuvem",section1:{title:"1. Nuvens de Possibilidades",p1:"Uma nebulosa não tem superfície sólida. É uma nuvem gigantesca de gás (principalmente hidrogênio) e poeira cósmica. A visualização que você vê usa milhares de pontos de luz transparentes para simular esse efeito volumétrico.",p2:'Algumas dessas nuvens, como os famosos "Pilares da Criação", têm anos-luz de altura. São verdadeiras fábricas de estrelas.'},section2:{title:"2. A Química da Cor",p1:'As cores vibrantes das nebulosas não são "pintadas"; elas são a assinatura química dos elementos sendo ionizados pela radiação intensa das estrelas próximas.',pink_title:"Rosa/Vermelho:",pink_desc:"A cor mais comum, causada pelo Hidrogênio brilhando.",cyan_title:"Azul/Verde:",cyan_desc:"Geralmente indica a presença de Oxigênio (OIII)."},section3:{title:"3. O Colapso",p1:"Dentro dessas nuvens escuras e frias, a gravidade começa a vencer. Aglomerados de gás começam a se colapsar sob o próprio peso, ficando cada vez mais quentes e densos, até que... FUSÃO NUCLEAR. Uma estrela nasce, iluminando a nuvem ao seu redor de dentro para fora."}}},Bg={nav:{blackhole:"Agujero Negro",neutronstar:"Estrella de Neutrones",saturn:"Saturno",nebula:"Nebulosa"},common:{scroll_hint:"Explora el universo de abajo",author:"Patrick Serrano",date:"24/01/2026",app_title:"Visualización Interactiva del Universo",audio_on:"Audio Encendido",audio_off:"Audio Apagado",loading:"Cargando...",audio_unavailable:"No disponible"},blackhole:{title_main:"En el Límite de la Realidad",title_sub:"Una Jornada Interactiva a los Agujeros Negros",description:"Una exploración visual e interactiva sobre la física, história e mistério dos buracos negros, potencializada por Three.js.",tags:["Astrofísica","Educação","Three.js","Interativo"],section1:{title:"1. ¿Qué es un Agujero Negro?",subtitle:"El Último Desagüe Cósmico",p1:"Imagina un lugar donde la gravedad es tan intensa que nada, absolutamente nada, puede escapar. Ni cohetes, ni partículas, ni siquiera la luz — lo más rápido del universo. Ese lugar es un agujero negro.",p2:'No son "agujeros" en el sentido tradicional, sino cantidades inmensas de materia comprimida en un espacio increíblemente pequeño.',analogy:"Analogía: Es como compactar la masa de diez soles en el tamaño de una ciudad como Madrid. El resultado es un campo gravitatorio que deforma el tejido del espacio y el tiempo a su alrededor de forma irreversible.",anatomy_title:"Anatomía del Abismo",event_horizon:"Horizonte de Eventos:",event_horizon_desc:"El punto de no retorno. La esfera negra central que ves en la visualización. Si cruzas esta línea, perteneces al agujero negro para siempre.",singularity:"Singularidade:",singularity_desc:"El centro teórico. Un punto de densidad infinita y volumen cero donde las leyes de la física tal como las conocemos dejan de tener sentido.",accretion_disk:"Disco de Acreción:",accretion_disk_desc:"El anillo brillante y caliente de gas y polvo que gira a velocidades cercanas a la de la luz. La fricción genera tanto calor que el disco brilla en rayos X, haciendo que el agujero negro sea visible indirectamente."},section2:{title:"2. Gigantes de la Ciencia: Una Línea del Tiempo",p1:"La comprensión de estos monstruos cósmicos no ocurrió de la noche a la mañana. Fue una construcción de siglos.",year_1783_title:"El Visionario: John Michell",year_1783_desc:'Un clérigo y astrônomo inglês que propôs pela primeira vez a ideia de "estrelas escuras". Usando a física newtoniana, ele calculou que uma estrela poderia ser tão massiva que sua velocidade de escape superaria a da luz.',year_1915_title:"El Arquitecto: Albert Einstein",year_1915_desc:'Su Teoría de la Relatividad General criou a fundação para eles. Einstein mostrou que a gravidade não é uma "força" mágica, mas a curvatura do espaço-tempo causada pela massa.',einstein_quote:'"La materia le dice al espacio cómo curvarse. El espacio le dice a la materia cómo moverse."',year_1916_title:"El Solucionador: Karl Schwarzschild",year_1916_desc:"Meses após a publicação de Einstein, Schwarzschild encontrou a primeira solução exata para as equações, prevendo o tamanho exato que algo precisa ser comprimido para virar um buraco negro.",era_golden_title:"La Era Dorada",wheeler_name:"John Wheeler:",wheeler_desc:'Popularizou o termo "agujero negro".',penrose_name:"Roger Penrose:",penrose_desc:"Provou que singularidades são inevitáveis no colapso gravitacional.",hawking_name:"Stephen Hawking:",hawking_desc:'Mostrou que buracos negros emitem radiação ("Radiación de Hawking").',year_2019_title:"La Imagen: Colaboración EHT",year_2019_desc:"Uma rede global de radiotelescópios capturou a primeira imagem direta da sombra de um buraco negro supermassivo em M87."},section3:{title:"3. El Lenguaje Matemático del Cosmos",p1:"No necesitamos ser físicos para apreciar a belleza de las ecuaciones que describen a estos monstruos.",schwarzschild_title:"El Radio de Schwarzschild",schwarzschild_desc:'Esta ecuación define el tamaño de la "boca" del agujero negro.',rs:"Radio del horizonte",m:"Massa do objeto",g:"Constante gravitacional",c:"Velocidad de la luz",einstein_eq_title:"Ecuaciones de Campo de Einstein",einstein_eq_desc:"La base de toda la cosmología moderna.",left_side:"Lado Izquierdo (Gμν):",left_side_desc:"Describe la geometría (curvatura) del espacio-tiempo.",right_side:"Lado Derecho (Tμν):",right_side_desc:"Eescribe la distribución de materia y energía.",einstein_summary:'"La presencia de masa curva el universo a su alrededor".'},section4:{title:"4. ¿Por Qué Importa?",item1_title:"1. El Laboratório Definitivo",item1_desc:'El único lugar donde la Relatividad General y la Mecánica Cuántica colisionan. La clave para la "Teoría del Todo".',item2_title:"2. Tecnología GPS",item2_desc:"Los sistemas GPS dependem de las correcciones relativistas de Einstein. Sin ellas, la precisión caería kilómetros por día.",item3_title:"3. Ondas Gravitatorias",item3_desc:'Desde 2015, podemos "escuchar" colisiones de agujeros negros, una nueva ventana para observar lo invisible.',item4_title:"4. Filosofía",item4_desc:"Representan el límite del conocimiento y nos obligan a confrontar la vastedad y extrañeza del universo."}},neutron:{title_main:"Estrellas de Neutrones",title_sub:"La Reina de la Densidad",description:"Un viaje al objeto más denso del cosmos, donde la materia es aplastada al límite y los campos magnéticos desafían la imaginación.",tags:["Astrofísica","Púlsar","Three.js","Magnetismo"],scroll_hint:"Observa el faro cósmico",section1:{title:"1. El Cadáver Estelar",p1:"Cuando una estrella gigante muere en uma supernova, mas não é lo suficientemente masiva para convertirse en un agujero negro, se convierte en esto: una bola de neutrones puros.",density_title:"Densidade Inconcivível:",density_desc:"Imagina exprimir la masa de 1,5 Soles dentro de una esfera del tamaño de la isla de Manhattan (aprox. 20km). Una cucharadita de esta materia pesaría tanto como el Monte Everest.",crust_title:"La Corteza de Hierro",crust_p:'A diferencia de las estrellas gaseosas normales, possuem una corteza sólida, 10 mil milhões de vezes mais dura que o aço. Las "montañas" en esta superfície teriam apenas alguns milímetros de altura devido à gravidade aplastante.'},section2:{title:"2. El Faro Cósmico (Púlsares)",p1:"Muchas estrellas de neutrones giran increiblemente rápido, cientos de veces por segundo. Emiten haces de radiación por los polos magnéticos.",p2:'Como o eixo magnético nem sempre se alinha com o eixo de rotação, estos haces barren el cielo. Si la Tierra está en el camino, vemos um "pulso" de luz regular, como um faro marítimo. De ahí el nombre: Púlsar.'},section3:{title:"3. Magnetismo Extremo",magnetar_title:"Magnetars",magnetar_desc:"Algunas estrellas de neutrones, chamadas Magnetars, possuem os campos magnéticos mais fortes do universo.",earth:"Tierra:",fridge_magnet:"Imán de nevera:",mri:"Resonancia Magnética:",magnetar:"Magnetar:",magnetar_warning:"Este campo é tão forte que, a 1000 km de distância, distorsionaria os átomos de tu cuerpo, transformando sua química em algo impossível de manter a vida."}},saturn:{title_main:"El Señor de los Anillos",title_sub:"La Grandeza de Saturno",description:"Un viaje visual al gigante gaseoso, seus anéis de gelo e as lunas que guardam segredos de vida.",tags:["Sistema Solar","Cassini","Astronomía","Three.js"],scroll_hint:"Explora los anillos",section1:{title:"1. No es un Disco Sólido",p1:"Aunque pareçam sólidos vistos desde la Tierra, los anillos de Saturno estão compostos em realidade por miles de millones de trozos de hielo y roca.",p2:"El tamaño de estas partículas varía desde granos de polvo hasta montañas enteras. La visualização que você vê utiliza miles de pequeñas rochas simuladas individualmente para recrear essa dispersão.",fact_title:"Dato Sorprendente:",fact_desc:"A pesar de tener miles de kilómetros de ancho, los anillos son increíblemente delgados — em promedio, têm apenas uns 10 metros de espesor."},section2:{title:"2. Las Lunas Pastoras y la Vida",p1:"Saturno não reina solo. Está acompañado por una corte de docenas de lunas. Algumas, chamadas Lunas Pastoras, orbitam dentro ou cerca de los anillos, usando sua gravidade para manter as partículas de gelo em ordem, criando as divisiones visibles entre los anillos.",enceladus_title:"Encélado: Donde la Vida Puede Existir",enceladus_p:"Uma das lunas mais fascinantes é Encélado. Cubierta por una capa de hielo blanco brillante, esconde um oceano global de água líquida sob a superfície. Géiseres gigantes expulsan água al espacio, o que sugiere que este pequeno mundo puede tener todos los ingredientes necesarios para la vida."},section3:{title:"3. El Legado da Cassini",p1:"Mucho de lo que sabemos hoy proviene da missão Cassini-Huygens (1997-2017). Durante 13 anos, a sonda orbitou Saturno, enviando imagens deslumbrantes e dados revolucionários.",p2:'Em seu "Grand Finale", Cassini se sumergió valientemente no estrecho espacio entre o planeta e seus anéis, antes de desintegrarse na atmosfera de Saturno para proteger as lunas da contaminación terrestre.'}},nebula:{title_main:"Viveros Cósmicos",title_sub:"Nebulosas",description:"Donde nacen las estrellas. Uma nube colosal de gás e polvo esculpida pela radiação de estrelas recém-nascidas.",tags:["Nebulosa","Formação Estelar","Química Cósmica"],scroll_hint:"Sumérgete en la nube",section1:{title:"1. Nuvens de Possibilidades",p1:"Uma nebulosa não tem superfície sólida. Es una nube gigantesca de gás (principalmente hidrogênio) e polvo cósmico. A visualização que você vê utiliza miles de pontos de luz transparentes para simular esse efeito volumétrico.",p2:'Algumas dessas nuvens, como os famosos "Pilares de la Creación", têm anos luz de altura. São verdadeiras fábricas de estrelas.'},section2:{title:"2. La Química del Color",p1:'Los colores vibrantes de las nebulosas não estão "pintados"; son a firma química dos elementos que estão sendo ionizados pela intensa radiação das estrelas próximas.',pink_title:"Rosa/Rojo:",pink_desc:"El color más común, causado pelo brilho do Hidrogênio.",cyan_title:"Azul/Verde:",cyan_desc:"Geralmente indica a presença de oxigênio (OIII)."},section3:{title:"3. El Colapso",p1:"Dentro de estas nubes oscuras e frias, a gravidade começa a ganhar. Los cúmulos de gás começam a colapsar sob seu próprio peso, volviéndose cada vez mais calientes e densos, até que... FUSIÓN NUCLEAR. Nace uma estrela, iluminando a nube a seu redor desde dentro."}}},Gl=["en","pt","es"],Ff={en:Fg,pt:Og,es:Bg};hc("en",Fg);hc("pt",Og);hc("es",Bg);function MM(){const n=EM();tM({fallbackLocale:"en",initialLocale:n})}function EM(){if(typeof window>"u")return"pt";const n=localStorage.getItem("preferredLanguage");if(n&&Gl.includes(n))return n;const e=navigator.language.split("-")[0];return Gl.includes(e)?e:"pt"}function wM(){const{subscribe:n,set:e}=fo("pt");return{subscribe:n,translations:Ff,setLanguage(i){return typeof localStorage<"u"&&localStorage.setItem("preferredLanguage",i),qi.set(i),e(i),i},initialize(){const i=typeof localStorage<"u"?localStorage.getItem("preferredLanguage"):null;if(i&&Gl.includes(i)){this.setLanguage(i);return}if(typeof navigator<"u"){const r=navigator.language.split("-")[0];if(Gl.includes(r)){this.setLanguage(r);return}}this.setLanguage("pt")},t(i,r){if(!r)return i;const s=i.split(".");let a=Ff[r];for(const o of s)if(a&&typeof a=="object"&&o in a)a=a[o];else return i;return typeof a=="string"?a:i}}}const TM=wM();MM();var AM=Dt('<div class="language-selector svelte-mngkpt"><button aria-label="English">EN</button> <button aria-label="Português">PT</button> <button aria-label="Español">ES</button></div>');function CM(n,e){tn(e,!0);const t=()=>Qr(qi,"$locale",i),[i,r]=es();function s(u){qi.set(u),localStorage.setItem("preferredLanguage",u)}var a=AM(),o=D(a),l=X(o,2),c=X(l,2);jt(()=>{_i(o,1,Hs(t()==="en"?"active":""),"svelte-mngkpt"),_i(l,1,Hs(t()==="pt"?"active":""),"svelte-mngkpt"),_i(c,1,Hs(t()==="es"?"active":""),"svelte-mngkpt")}),vi("click",o,()=>s("en")),vi("click",l,()=>s("pt")),vi("click",c,()=>s("es")),gt(n,a),nn(),r()}ga(["click"]);/**
